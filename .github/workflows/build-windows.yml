name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'website/**'
      - '**.md'
      - '.github/workflows/build-mac.yml'
      - '.github/workflows/build-android.yml'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Compute build version
        id: ids
        shell: bash
        run: |
          DATE=$(date -u +%y%m%d)
          echo "version=2.4.$DATE" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Set version in package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.ids.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build Vite app
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.ids.outputs.version }}

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload installer + latest.yml to windows-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view windows-latest || \
            gh release create windows-latest \
              --title "Windows — Latest Build" \
              --notes "Auto-built on every push to main."
          gh release upload windows-latest \
            "dist_electron2/fortress-options-setup.exe" --clobber
          gh release upload windows-latest \
            "dist_electron2/latest.yml" --clobber
