name: Keep Render Alive

on:
  schedule:
    # Every 10 minutes, Mon-Fri during market hours (13:00-21:00 UTC = 9AM-5PM ET)
    - cron: '*/10 13-21 * * 1-5'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Fortress Options backend
        run: |
          echo "Pinging Fortress Options backend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://fortress-options.onrender.com/api/status)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️ Backend returned $STATUS"
          fi
