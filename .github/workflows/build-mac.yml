name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'website/**'
      - '**.md'
      - '.github/workflows/build-mac.yml'
      - '.github/workflows/build-android.yml'
      - '.github/workflows/build-windows.yml'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Compute build version
        id: ids
        run: |
          DATE=$(date -u +%y%m%d)
          echo "version=2.4.$DATE" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Set version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.BUILD_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
        env:
          BUILD_VERSION: ${{ steps.ids.outputs.version }}

      - name: Build Vite app
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.ids.outputs.version }}

      - name: Build macOS DMG
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG + latest-mac.yml to mac-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view mac-latest || \
            gh release create mac-latest \
              --title "macOS — Latest Build" \
              --notes "Auto-built on every push to main. On first launch: right-click → Open → Open."
          gh release upload mac-latest \
            "dist_electron2/fortress-options.dmg" --clobber
          gh release upload mac-latest \
            "dist_electron2/latest-mac.yml" --clobber
